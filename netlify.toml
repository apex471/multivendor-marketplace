[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  # Suppress cosmetic "baseline-browser-mapping data is over two months old"
  # warning that Tailwind v4 emits — the package is already at latest (2.10.13).
  NODE_NO_WARNINGS = "1"
  # Force npm to install devDependencies even in production mode.
  # Netlify sets NODE_ENV=production which can cause npm to skip devDependencies
  # (tailwindcss, typescript, @netlify/plugin-nextjs, etc.) — this prevents that.
  NPM_FLAGS = "--include=dev"
  # NODE_ENV is intentionally NOT set here — Next.js sets it to "production"
  # automatically during `next build`. Setting it manually causes build warnings.

[[plugins]]
  package = "@netlify/plugin-nextjs"
